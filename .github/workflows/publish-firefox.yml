name: Publish to Firefox AMO

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@main
        with:
          deno-version: v2.x

      - name: Build Extension
        run: |
          deno task app
          deno task data

      - name: Package to ZIP
        run: cd dist && zip -r ../asli-firefox.zip *

      - name: Deploy to Mozilla Add-ons (AMO)
        uses: kewisch/action-web-ext@v1
        with:
          cmd: sign
          source: asli-firefox.zip
          apiKey: ${{ secrets.WEB_EXT_API_KEY }}
          apiSecret: ${{ secrets.WEB_EXT_API_SECRET }}
          channel: listed
